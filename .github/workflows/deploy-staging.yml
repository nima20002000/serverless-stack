name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            cd /home/dexter/kitia-staging

            # Pull latest code from staging branch
            git fetch origin
            git reset --hard origin/staging

            # Install/update dependencies only if package-lock.json changed
            if ! git diff --quiet HEAD~1 -- package-lock.json 2>/dev/null; then
              echo "Dependencies changed, running npm install..."
              npm install
            else
              echo "No dependency changes, skipping npm install"
            fi

            # Build application (keeps old .next until new build succeeds)
            npm run build

            # Reload PM2 (zero-downtime)
            pm2 reload ecosystem.config.js --update-env

            # Wait for application to start
            sleep 5

            # Health check
            if ! curl -f -s http://localhost:3002/api/health > /dev/null; then
              echo "Health check failed!"
              pm2 logs kitia-staging --lines 50 --nostream
              exit 1
            fi

            echo "Staging deployment successful!"
            pm2 status

      - name: Notify on failure
        if: failure()
        run: echo "Staging deployment failed! Check logs above."
