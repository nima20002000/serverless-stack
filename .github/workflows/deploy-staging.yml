name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          HUSKY: 0

      - name: Run verification
        run: npm run verify:routes

      - name: Type check
        run: npx tsc --noEmit

      - name: Deploy to VPS Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            cd /home/dexter/kitia-staging

            # Pull latest code from staging branch
            git fetch origin
            git reset --hard origin/staging

            # Install dependencies (including dev deps for build)
            npm ci

            # Remove previous build cache to ensure fresh build
            rm -rf .next

            # Build application
            npm run build

            # Reload PM2 (zero-downtime)
            pm2 reload ecosystem.config.js --update-env

            # Wait for application to start
            sleep 5

            # Health check
            if ! curl -f -s http://localhost:3002/api/health > /dev/null; then
              echo "Health check failed!"
              pm2 logs kitia-staging --lines 50 --nostream
              exit 1
            fi

            echo "Staging deployment successful!"
            pm2 status

      - name: Notify on failure
        if: failure()
        run: echo "Staging deployment failed! Check logs above."
