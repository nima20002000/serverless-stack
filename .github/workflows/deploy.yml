name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          # Public env vars (embedded at build time)
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLOUDFLARE_IMAGE_RESIZING_ENABLED: ${{ secrets.NEXT_PUBLIC_CLOUDFLARE_IMAGE_RESIZING_ENABLED }}
          # Server env vars (needed for static generation)
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          KAVENEGAR_API_KEY: ${{ secrets.KAVENEGAR_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          ZARINPAL_MERCHANT_ID: ${{ secrets.ZARINPAL_MERCHANT_ID }}
          ZARINPAL_SANDBOX: "false"
          DIGIPAY_BASE_URL: ${{ secrets.DIGIPAY_BASE_URL }}
          DIGIPAY_CLIENT_ID: ${{ secrets.DIGIPAY_CLIENT_ID }}
          DIGIPAY_CLIENT_SECRET: ${{ secrets.DIGIPAY_CLIENT_SECRET }}
          DIGIPAY_USERNAME: ${{ secrets.DIGIPAY_USERNAME }}
          DIGIPAY_PASSWORD: ${{ secrets.DIGIPAY_PASSWORD }}
          DIGIPAY_SANDBOX: "false"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          LOG_LEVEL: "info"
        run: npm run build

      - name: Create deployment package
        run: |
          # Create tarball of built application
          tar -czf deploy.tar.gz \
            .next \
            public \
            package.json \
            package-lock.json \
            next.config.js

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: deploy.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          source: deploy.tar.gz
          target: /tmp/

      - name: Extract and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            cd ${{ secrets.VPS_APP_PATH }}

            # Pull latest code (for any non-build files like .env, ecosystem.config.js)
            git fetch origin
            git reset --hard origin/main

            # Extract built application
            tar -xzf /tmp/deploy.tar.gz -C .
            rm /tmp/deploy.tar.gz

            # Install production dependencies only if package-lock.json changed
            if ! git diff --quiet HEAD~1 -- package-lock.json 2>/dev/null; then
              echo "Dependencies changed, running npm ci..."
              npm ci --production=false
            else
              echo "No dependency changes, skipping npm install"
            fi

            # Generate Prisma client (needed for runtime)
            npx prisma generate

            # Reload PM2 (zero-downtime)
            pm2 reload kitia --update-env

            # Wait for application to start
            sleep 5

            # Health check
            if ! curl -f -s http://localhost:3001/api/health > /dev/null; then
              echo "Health check failed!"
              pm2 logs kitia --lines 50 --nostream
              exit 1
            fi

            echo "Deployment successful!"
            pm2 status

      - name: Notify on success (email)
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: "nimarezapoor@gmail.com"
          FROM_EMAIL: "Kitia <noreply@kitia.ir>"
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl -sS -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "'"${FROM_EMAIL}"'",
              "to": ["'"${TO_EMAIL}"'"],
              "subject": "VPS Deploy Success - '"${REPO}"' @ '"${COMMIT_SHA}"'",
              "html": "<p>Deployment succeeded.</p><p><strong>Repo:</strong> '"${REPO}"'</p><p><strong>Commit:</strong> '"${COMMIT_SHA}"'</p><p><strong>Run:</strong> https://github.com/'"${REPO}"'/actions/runs/'"${RUN_ID}"'</p>"
            }'

      - name: Notify on failure (email)
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: "nimarezapoor@gmail.com"
          FROM_EMAIL: "Kitia <noreply@kitia.ir>"
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl -sS -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "'"${FROM_EMAIL}"'",
              "to": ["'"${TO_EMAIL}"'"],
              "subject": "VPS Deploy Failed - '"${REPO}"' @ '"${COMMIT_SHA}"'",
              "html": "<p><strong>Deployment failed.</strong></p><p><strong>Repo:</strong> '"${REPO}"'</p><p><strong>Commit:</strong> '"${COMMIT_SHA}"'</p><p><strong>Run:</strong> https://github.com/'"${REPO}"'/actions/runs/'"${RUN_ID}"'</p>"
            }'
